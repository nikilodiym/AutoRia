{% extends 'cars/base.html' %}
{% load socialaccount %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <span class="auto">auto</span>
            <span class="ria">RIA</span>
        </div>

        <h1>Ласкаво просимо 👋</h1>

        <p>
            Увійдіть або створіть акаунт за допомогою Google.
            Це займе менше 10 секунд.
        </p>

        <a class="auth-btn auth-btn--google auth-btn--full" href="{% provider_login_url 'google' %}">
            <span class="auth-icon" aria-hidden="true">G</span>
            <span class="auth-label">Продовжити через Google</span>
        </a>

        <p class="auth-page__hint">
            Після авторизації ви автоматично повернетеся на сайт.
        </p>
    </div>
</div>
{% endblock %}
